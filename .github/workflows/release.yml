name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Check version alignment
        run: npm run check:version

      - name: Build plugin
        run: npm run build:plugin:ci

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: coach-buddy.plugin
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
