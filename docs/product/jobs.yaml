---
# docs/product/jobs.yaml
# SSOT for validated Jobs-to-be-Done
# Bootstrapped by DISCUSS wave: coach-buddy-architecture (2026-05-12)

jobs:
  - id: thinking-partner
    title: "Work through a real coaching situation with a knowledgeable sounding board"
    job_story: >
      When I am preparing for or reflecting on a coaching situation —
      symptoms I can't name, dynamics I sense but haven't articulated,
      interventions I'm not sure about —
      I want a responsive, non-judgmental thinking partner who can help me
      see more clearly what's happening,
      so I can arrive at a session with sharper instincts and a plan I trust.
    dimensions:
      functional: "Articulate symptoms, name dynamics, evaluate interventions, design workshops, frame positioning"
      emotional: "Feel held and respected, not lectured; trust that my intuition is the primary signal"
      social: "Arrive at a session more prepared and confident; be seen as a skilled practitioner"
    four_forces:
      push: "No good sounding board available in the moment; colleagues not always reachable; journaling is slow and one-directional"
      pull: "A partner who can reflect dynamics back, surface what I'm missing, and follow my lead without taking over"
      anxiety: "Tool introduces frameworks that distract from the immediate situation; coaching becomes academic"
      habit: "Currently journals, calls a colleague, or goes in cold"
    opportunity:
      importance: high
      current_satisfaction: medium-low
      score: 8.5
      rationale: "High importance (coaches face real situations constantly); current alternatives are slow or unavailable; failure here is highly visible (session goes poorly)"

  - id: growth-vehicle
    title: "Discover relevant frameworks and approaches in context, when they actually apply"
    job_story: >
      When I am working through a coaching situation,
      I want to encounter frameworks and approaches I haven't used before
      — introduced at the right moment, not imposed —
      so I can expand my repertoire in a way that sticks because it's grounded in a real case.
    dimensions:
      functional: "Be introduced to frameworks, models, and theories relevant to the situation at hand"
      emotional: "Feel expanded and challenged, not overwhelmed or patronised"
      social: "Grow as a practitioner; be able to reference and explain new approaches in future conversations"
    four_forces:
      push: "Framework repertoire feels limited; reaching for the same 2-3 approaches; sense that there are better tools I don't know about"
      pull: "Learning that's grounded in a real case; frameworks introduced when I can immediately see their relevance"
      anxiety: "Introduced frameworks I'm not ready for; growth-mode leaking into situation-focus moments and disrupting flow"
      habit: "Reads books, attends training, but learning is decontextualized and doesn't transfer"
    opportunity:
      importance: medium-high
      current_satisfaction: low
      score: 7.5
      rationale: "Strong opportunity; current alternatives don't connect learning to live situations; lower than Job 1 because failure here is less immediately visible"

  - id: in-context-activation
    title: "Invoke thinking-partner support without switching away from where the work lives"
    job_story: >
      When I am working inside a team's project — reviewing artefacts, prepping for a
      session, observing a pattern — I want to invoke a thinking-partner lens without
      switching to a separate coaching tool, so I can think through what I'm observing
      while the triggering context is still in front of me.
    dimensions:
      functional: "Invoke /coach-buddy from any project; thinking-partner capability available where the work is"
      emotional: "Feel grounded and continuous — coaching flows from the work, not from a separate activity I retreat to"
      social: "Coaching practice feels integrated, not bolted on"
    four_forces:
      push: "Switching to a dedicated coaching project means describing the situation from memory; artefacts that prompted the thinking are no longer visible; context is lost before the conversation starts"
      pull: "Invoke coaching while still looking at the sprint board, the decision doc, what triggered the thinking"
      anxiety: "Skill in a team project might deliver reduced capability without reference files; quality unpredictable; not knowing what you're getting"
      habit: "Opens a separate coaching project, reconstructs the situation from memory, or thinks through it alone"
    opportunity:
      importance: medium-high
      current_satisfaction: low
      score: 7.0
      rationale: "Relevant for coaches who work in Claude Chat team projects; context-switching cost is real and continuous; not universal (only if team projects are already in use)"
    validated: false
    note: "Emerged from real use of Slice 01 (2026-05-12). Not yet validated with additional coaches."

  - id: portable-across-teams
    title: "Install thinking-partner support into any team project with minimal effort"
    job_story: >
      When I am coaching multiple teams across separate projects,
      I want to add thinking-partner capability to any team's project with a single
      install step, so each team has access to the coaching lens without me having
      to build and maintain separate dedicated tools per engagement.
    dimensions:
      functional: "One install command or simple setup; consistent behaviour across all team projects"
      emotional: "Feel scalable rather than spread thin; the toolkit travels with me"
      social: "Coach who brings structured thinking-partner support to every engagement; differentiated practice"
    four_forces:
      push: "Per-team setup is high-friction; maintaining multiple copies is unsustainable; inconsistency across teams erodes trust in the tool"
      pull: "One install, any project has the capability; setup cost does not scale with number of teams"
      anxiety: "Quality might vary if reference files aren't installed per-team; coach can't guarantee a consistent experience across all team projects"
      habit: "Uses one dedicated project for everything (constant context switching), or manually duplicates setup, or doesn't offer the tool to teams"
    opportunity:
      importance: medium
      current_satisfaction: low
      score: 6.5
      rationale: "Aspirational — not yet an active pain, but the clear direction of travel. J5 is a distribution job, not a coaching experience job. Falls out of the same architectural work as J3."
    validated: false
    note: "Emerged from mental model shift (2026-05-12). Not yet in use. Prioritise J3 (in-context-activation) first."

  - id: situated-coaching-across-sessions
    title: "Arrive at every coaching conversation with persistent knowledge of the team's context and arc"
    job_story: >
      When I'm in an ongoing engagement with a team across many weeks,
      I want coach-buddy to have persistent knowledge of that team's context, history, and coaching arc,
      so I don't have to reconstruct the situation from scratch at the start of every conversation.
    dimensions:
      functional: "Engagement folder with CONTEXT.md, COACHING_LOG.md, RETRO_ACTIONS.md, HISTORY.md; skills that read and write those files"
      emotional: "Feel continuous and grounded — coaching builds, not starts over"
      social: "Coaching practice that visibly accumulates; arc visible to the coach across time"
    four_forces:
      push: "Cold-start friction on every session; coaching arc invisible; hypotheses evaporate between sessions; have to re-describe team context from memory"
      pull: "Conversations that build on prior observations; running hypotheses and interventions that accumulate; coaching arc readable at a glance"
      anxiety: "Engagement files go stale; false confidence from outdated context; too much overhead to keep current"
      habit: "Mental notes, personal journal, re-reads old notes inconsistently before sessions"
    opportunity:
      importance: high
      current_satisfaction: very-low
      score: 9.0
      rationale: "Highest-value job in this slice. Cold-start friction is the primary barrier to coach-buddy as an ongoing tool rather than a one-off resource."
    validated: false
    note: "Emerged from reference implementation (2026-05-14). Validated in one engagement context; not yet in wider use."

  - id: structured-observation-capture
    title: "Record coaching observations in a Safety-II-informed structure that supports hypothesis building over time"
    job_story: >
      When I notice something worth tracking during or after a session,
      I want to record it in a structured Safety-II format (observed / hypothesis / intervention),
      so I can build a testable coaching arc rather than an impressionistic journal.
    dimensions:
      functional: "Structured COACHING_LOG.md with six fields; quick-capture path; update-by-ID; retro action tracking"
      emotional: "Feel like I'm building something, not just noting things; the structure gives me confidence that nothing important is slipping"
      social: "Practice that looks rigorous and traceable; coaching backed by evidence not just instinct"
    four_forces:
      push: "Free-form notes don't surface patterns; hypothesis and intervention not linked; observation becomes a Post-it that disappears"
      pull: "Running log where patterns emerge across entries; interventions traceable; hypotheses visible and testable"
      anxiety: "Structure feels like overhead when tired after a session; might not fill in all fields every time"
      habit: "Free-form journaling, or nothing"
    opportunity:
      importance: high
      current_satisfaction: low
      score: 8.0
      rationale: "High value for ongoing engagements; structure risk (overhead) is real but mitigated by quick-capture path."
    validated: false
    note: "Emerged from reference implementation (2026-05-14)."

  - id: board-snapshot-without-context-switch
    title: "Get a structured picture of the team's work state without leaving the coaching context"
    job_story: >
      When I'm preparing for a coaching conversation or session,
      I want a structured current picture of the team's work state available in my coaching context,
      so I can reason from Work-as-Done rather than Work-as-Imagined without manually querying the project management tool.
    dimensions:
      functional: "Dated snapshot file at known path; four sections (WIP/Progress/Runway/Waiting); age-flags; two-sentence risk read"
      emotional: "Feel prepared and grounded in reality, not in what I remember from the last session"
      social: "Coaching from evidence; less reliance on what the team tells me they're working on"
    four_forces:
      push: "Manual Jira query is a separate context switch; data doesn't persist in coaching context; screenshot is quick but unstructured"
      pull: "Snapshot file that surfaces WIP age, flow health, risk signals; readable in 30 seconds; uploadable to Chat"
      anxiety: "Snapshot might be stale; automated query requires MCP setup; not available if tool is 'none'"
      habit: "Opens Jira directly, screenshots, copy-pastes relevant items, or skips the data entirely"
    opportunity:
      importance: medium-high
      current_satisfaction: very-low
      score: 7.5
      rationale: "High value when a project management MCP is available; medium value with manual paste fallback. Bridge between live skills and Chat project knowledge."
    validated: false
    note: "Emerged from reference implementation (2026-05-14). Jira reference implementation; tool-agnostic design required."

  - id: engagement-scaffolding
    title: "Scaffold a new engagement folder structure with one command"
    job_story: >
      When I start coaching a new team,
      I want to run one command that creates a consistent engagement folder structure,
      so I can start capturing context from day one without designing the structure from scratch each time.
    dimensions:
      functional: "init skill; engagements/<team-slug>/ folder with four files and config.json; consistent across engagements"
      emotional: "Feel set up and ready; no friction at the start of a new engagement"
      social: "Consistent practice across all engagements; nothing improvised"
    four_forces:
      push: "Every engagement starts with improvised structure; no consistency; copying from previous engagement introduces stale content"
      pull: "One command, ready structure, nothing to design; consistent across every team"
      anxiety: "Generic structure may not fit a short or unusual engagement; ceremony overhead for low-stakes contexts"
      habit: "Copies files from a previous engagement or starts from blank"
    opportunity:
      importance: medium
      current_satisfaction: very-low
      score: 7.0
      rationale: "Enabler for J6 (situated coaching) — without scaffolding, the other skills have nowhere to write. Moderate standalone value; high value as a prerequisite."
    validated: false
    note: "Emerged from reference implementation (2026-05-14)."

  - id: hypothesis-validation
    title: "Close the loop on coaching hypotheses by reviewing which predictions are now ripe for validation"
    job_story: >
      When I have accumulated several logged hypotheses across coaching sessions,
      I want a structured review that surfaces which ones I can now validate
      (enough time has passed, or an intervention has occurred),
      so I can build a coaching practice that learns from misses and confirming moments,
      not just one that records them.
    dimensions:
      functional: "Surface aged hypotheses; prompt validation; update status in COACHING_LOG.md"
      emotional: "Feel like I'm actually learning from my coaching, not just noting things; the arc closes, not just grows"
      social: "Coaching practice that visibly improves over time; evidence of learning from experience, not just evidence of observation"
    four_forces:
      push: "Hypotheses pile up and are never revisited; coaching arc is linear input only; observation becomes a Post-it that disappears"
      pull: "A review mechanism that asks 'did X happen?' — closes the loop and builds a learning arc, not just a record"
      anxiety: "Adding another step to an already effortful practice; worry that validation reveals the hypotheses were wrong all along"
      habit: "Manually re-reads old log entries inconsistently, or doesn't revisit them at all"
    opportunity:
      importance: high
      current_satisfaction: very-low
      score: 8.5
      rationale: "J7 records; nothing closes the loop. This is the missing final step of the Safety-II arc. High importance because hypothesis validation is what distinguishes a testable coaching arc from an impressionistic journal. Very low current satisfaction because no mechanism exists."
    validated: false
    note: "Emerged from AI reviewer analysis of coach-buddy engagement layer (2026-05-14). Identified as the most critical gap: 'captures perfectly but validates nothing.'"

  - id: cowork-native-setup
    title: "Initialise a coaching engagement in a project directory that IS the engagement"
    job_story: >
      When I am starting a new coaching engagement in a dedicated project directory
      (a directory whose sole purpose is that engagement),
      I want to scaffold engagement files directly at the project root — not inside
      an engagements/<slug>/ subdirectory — so I can work with engagement artefacts
      where they naturally live, without a redundant wrapper folder.
    dimensions:
      functional: "cb-init --root places all engagement files at project root; downstream skills resolve paths from root; no slug disambiguation prompt needed"
      emotional: "Feel immediately at home — files are where I expect them, not buried; no ceremony overhead for a single-engagement project"
      social: "CoWork project that looks like a CoWork project: clean root, engagement files at top level, no structural artefact of a legacy multi-engagement model"
    four_forces:
      push: "engagements/<slug>/ subdirectory is a redundant wrapper when the whole project is one engagement; path verbosity in every file reference; feels like the tool doesn't know where I am"
      pull: "Engagement files at root — same level as CLAUDE.md and .claude/ — matching the real mental model of a dedicated coaching project"
      anxiety: "Root-level file names (COACHING_LOG.md, CONTEXT.md) might collide with files already in the project; overwrite guard must be explicit"
      habit: "Manually moves files from engagements/<slug>/ to root after init, or tolerates the subdirectory"
    opportunity:
      importance: medium-high
      current_satisfaction: low
      score: 7.5
      rationale: "Specific to the CoWork-pattern deployment. Pain is real (confirmed by manual migration of advisor-connect). Low current satisfaction because no supported path exists — coach must hand-migrate or tolerate the wrapper."
    validated: true
    note: "Grounded in ADR-012 (2026-05-19). Real-world confirmation: ~/teams/advisor-connect manually migrated to root layout. Primary job anchor for cb-root-layout feature."

  - id: ceremony-aware-engagement
    title: "Work from a single team-topology file when coaching a team that also uses calendar-magick"
    job_story: >
      When I am running an ongoing coaching engagement with a team that also uses
      calendar-magick to manage their ceremony schedule,
      I want my coaching tools to read team structure and sprint cadence from the
      teams.yaml file I already maintain for calendar-magick,
      so I don't have to duplicate member, role, and sprint data in a separate coaching file
      and keep both copies in sync as the team changes.
    dimensions:
      functional: "Link config.json to teams.yaml; read sprint cadence for snapshot headers; pre-fill cb-init from detected teams.yaml"
      emotional: "Feel joined-up — two tools, one team definition; nothing to keep in sync"
      social: "A coherent toolkit: calendar-magick and coach-buddy working from the same source rather than two siloed configs"
    four_forces:
      push: "Maintaining overlapping team data in two files; updating roster in calendar-magick AND in config.json when someone joins; board snapshots show calendar dates with no sprint context"
      pull: "One teams.yaml update propagates to both tools; snapshot headers read 'Day 4 of Sprint 8 (week 2/2)' rather than just a date; cb-init pre-fills from existing teams.yaml"
      anxiety: "Integration forces calendar-magick's schema onto coaches who don't use it; breaking changes to existing engagements that have no teams.yaml; feature adds complexity for the simple case"
      habit: "Manually keeps config.json and teams.yaml in sync; tolerates the duplication as the price of using two tools; calculates sprint day mentally from the sprint start date"
    opportunity:
      importance: medium
      current_satisfaction: very-low
      score: 6.5
      rationale: >
        Relevant only to coaches who use both tools together — a niche that will grow
        as calendar-magick matures. Current satisfaction is very-low (zero integration today).
        Importance is medium because the duplication pain is real but tolerable.
        Enabling job for richer board snapshots (J8) and faster cb-init setup (J9).
    validated: false
    note: "Emerged from pairing observation (2026-05-19). calendar-magick teams.yaml and coach-buddy config.json have overlapping team-topology data."

  - id: reliable-log-capture
    title: "Trust that log entries are consistent regardless of which session wrote them"
    job_story: >
      When I review my coaching log or update an entry from a different session,
      I want every entry to follow the same format,
      so I can read, search, and update my log without encountering formatting
      inconsistencies introduced by different LLM sessions.
    dimensions:
      functional: "Consistent entry format across sessions; reliable --update targeting; searchable, parseable log history"
      emotional: "Feel confident that the log is a trustworthy record; not anxious about formatting drift between sessions"
      social: "Maintain a professional, consistent coaching record that reflects care and discipline"
    four_forces:
      push: "Different sessions write entries with different blank lines, capitalisation, or placeholder text; --update fails or targets the wrong line when format varies; coach loses trust in the tool after encountering inconsistency"
      pull: "A log that always looks the same regardless of which session wrote it; --update that always finds and replaces the right field"
      anxiety: "Stricter format rules might make the skill inflexible or break edge cases; existing entries might not match the new canonical form"
      habit: "Trusts the LLM to produce consistent output without verifying; lives with occasional formatting inconsistencies"
    opportunity:
      importance: medium
      current_satisfaction: low
      score: 6.5
      rationale: "Real pain for coaches who use --update or review historical entries across sessions. Lower urgency than core coaching-experience jobs but directly affects log reliability. Enabling quality for structured-observation-capture (J7)."
    validated: false
    note: "Emerged from cb-log-deterministic-writes feature work (2026-05-20). Enabling job for reliable --update and consistent log review."

tension_note: >
  J1 vs J2: The two coaching experience jobs want different orientations.
  J1 (thinking-partner) wants the tool to follow — serve the situation, not introduce new material.
  J2 (growth-vehicle) wants the tool to surface — expand the coach's horizon.
  Resolved by ADR-003/004/005: mode management, ask-rather-than-assume, situation-focus tiebreaker.

  J3 vs J1/J2: In-context activation doesn't change what good coaching looks like — it changes
  where the coach accesses it. ADRs stand. The gap is deployment: SKILL.md must be self-sufficient
  without reference files. Quality degrades gracefully (good → reliably sharp) not catastrophically.

  J4 (team as user): Explicitly out of scope. Coach is sole user.

  J5 vs J3: J5 is a distribution job. It falls out of solving J3. Aspirational, not yet validated.

  J6-J9 (engagement context layer): Additive to J1-J5. J6 is the primary value job; J7, J8, J9 are
  its enabling jobs. J9 (scaffolding) is a prerequisite for J6, J7, J8. J8 (board snapshot) is the
  bridge between live skills and Chat project knowledge — it makes the persistent context portable.
